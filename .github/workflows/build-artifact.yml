name: Build artifact

# Builds apps/web/.next in CI and publishes it as a GitHub Release asset so the
# production server never has to run `next build`. The EC2 box only downloads
# the artifact that matches its checked-out commit (scripts/fetch-build.sh).
#
# Required repository variable (Settings -> Secrets and variables -> Actions -> Variables):
#   NEXT_PUBLIC_API_URL - the PRODUCTION value. Next inlines NEXT_PUBLIC_* at
#   build time, so a wrong/missing value here silently ships to users.

on:
  push:
    branches: [main]
  # Pull requests build and package too, so the pipeline is proven before it is
  # merged. Only pushes to main publish a Release.
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-artifact-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    # `next build` prerenders DB-backed pages (e.g. /credit/publications runs
    # prisma.$queryRaw), and both Prisma clients throw at import time when their
    # URL is unset. So the build needs a real, migrated Postgres - this is a
    # throwaway one. Production data is never involved: every DB-backed page is
    # server-rendered on demand, so nothing from this database is baked into the
    # artifact.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ESG_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/portal_esg
      CREDIT_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/portal_credit

    steps:
      - uses: actions/checkout@v4

      - name: Require production public env
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
        run: |
          if [ -z "$NEXT_PUBLIC_API_URL" ]; then
            echo "::error::Repository variable NEXT_PUBLIC_API_URL is not set."
            echo "::error::Next.js inlines NEXT_PUBLIC_* at build time. Without it this artifact would ship http://localhost:3000 to production."
            exit 1
          fi
          echo "Building with NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL"

      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.1

      # Must match the Node major running on the server (see engines: >=22.12.0).
      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Create build databases
        run: |
          psql postgresql://postgres:postgres@127.0.0.1:5432/postgres -v ON_ERROR_STOP=1 <<'SQL'
          CREATE DATABASE portal_esg;
          CREATE DATABASE portal_credit;
          SQL

      # The schema must exist or the build-time queries fail on missing tables.
      # NODE_ENV is intentionally not "production" here: that would make
      # db:migrate:deploy demand the *_MIGRATION_DATABASE_URL production
      # identities, which must never exist in CI.
      - name: Apply migrations to the build databases
        run: pnpm db:migrate:deploy

      - name: Build web
        env:
          # The only value that truly matters: Next INLINES NEXT_PUBLIC_* into
          # the bundle at build time, so this must be the real production URL.
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_TELEMETRY_DISABLED: "1"

          # Everything below is a build-time placeholder, never a real secret.
          # Several modules construct API clients at module scope (5x
          # `new OpenAI(...)`, plus both Prisma clients), and `next build`
          # imports every route while collecting page data - so these must be
          # PRESENT or the build throws. They are never used: no network call
          # happens during a build.
          #
          # These cannot leak into the artifact. Next only inlines NEXT_PUBLIC_*;
          # every other value stays a runtime `process.env` lookup, so the server
          # reads the real values from its own .env when it starts.
          OPENAI_API_KEY: build-placeholder-not-used
          OPENAI_ESG_DRIVERS_MODEL: gpt-5.4-mini
          GOOGLE_API_KEY_2: build-placeholder-not-used
          GOOGLE_CSE_ID_2: build-placeholder-not-used
          TAVILY_API_KEY: build-placeholder-not-used
          NEXTAUTH_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXTAUTH_SECRET: build-placeholder-secret-with-at-least-32-chars
          CRON_SECRET: build-placeholder-secret-with-at-least-32-chars
          MAIL_SERVER: smtp.example.test
          MAIL_PORT: "587"
          MAIL_USERNAME: build@example.test
          MAIL_PASSWORD: build-placeholder-not-used
          MAIL_FROM: build@example.test
        run: pnpm build

      - name: Package .next
        run: |
          # Ship only what `next start` actually reads.
          #   .next/cache      (~970 MB) local build cache - never ship.
          #   .next/standalone (~170 MB) only used by the Docker/standalone
          #                    runtime; PM2 runs `next start`, which ignores it.
          tar -czf web-next.tar.gz \
            -C apps/web \
            --exclude='./.next/cache' \
            --exclude='./.next/standalone' \
            ./.next
          sha256sum web-next.tar.gz | tee web-next.tar.gz.sha256
          ls -lh web-next.tar.gz

      - name: Write build info
        run: |
          cat > build-info.json <<EOF
          {
            "commit": "${GITHUB_SHA}",
            "ref": "${GITHUB_REF}",
            "node": "$(node --version)",
            "pnpm": "$(pnpm --version)",
            "nextPublicApiUrl": "${{ vars.NEXT_PUBLIC_API_URL }}",
            "builtAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "runId": "${GITHUB_RUN_ID}"
          }
          EOF
          cat build-info.json

      - name: Upload artifact for inspection (pull requests)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: web-next-${{ github.sha }}
          path: |
            web-next.tar.gz
            web-next.tar.gz.sha256
            build-info.json
          retention-days: 7

      - name: Publish release asset
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="build-${GITHUB_SHA:0:12}"
          FILES="web-next.tar.gz web-next.tar.gz.sha256 build-info.json"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists; replacing assets."
            gh release upload "$TAG" $FILES --clobber
          else
            gh release create "$TAG" $FILES \
              --title "$TAG" \
              --notes "Prebuilt apps/web/.next for ${GITHUB_SHA}. Fetch on the server with: pnpm deploy:fetch-build" \
              --latest
          fi
          echo "Published $TAG"
